<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodLink Token 抓取器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f8f9fa; color: #202124; }
.header { background: linear-gradient(135deg, #4285f4, #34a853); color: #fff; padding: 20px 24px; text-align: center; }
.header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.header p { font-size: 12px; opacity: .85; }
.container { padding: 20px 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: center; }
.btn-primary { background: linear-gradient(135deg, #4285f4, #34a853); color: #fff; }
.btn-primary:hover { box-shadow: 0 4px 12px rgba(66,133,244,.3); transform: translateY(-1px); }
.btn-secondary { background: #e8f0fe; color: #1a73e8; margin-top: 8px; font-size: 12px; padding: 10px; }
.btn-secondary:hover { background: #d2e3fc; }
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.setting-row label { font-size: 12px; color: #5f6368; white-space: nowrap; }
.setting-row input { flex: 1; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 6px; font-size: 12px; }
.setting-row input:focus { outline: none; border-color: #4285f4; }
.status { text-align: center; padding: 16px 0; }
.spinner { width: 32px; height: 32px; border: 3px solid #e8eaed; border-top-color: #4285f4; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-size: 13px; color: #5f6368; line-height: 1.6; }
.result-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f3f4; font-size: 12px; }
.result-item:last-child { border-bottom: none; }
.result-label { color: #5f6368; }
.result-value { font-family: 'Cascadia Code', monospace; color: #1a73e8; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-success { background: #e6f4ea; color: #137333; }
.tag-warning { background: #fef7e0; color: #b06000; }
.tag-error { background: #fce8e6; color: #c5221f; }
.history-item { padding: 10px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
.history-name { font-weight: 600; }
.toast { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 6px; background: #323232; color: #fff; font-size: 12px; z-index: 999; }
.badge { background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-left: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>GoodLink Token 抓取器</h1>
  <p>百度网盘 OAuth Token + BDUSS</p>
</div>

<div class="container">
  <!-- 无痕权限提示 -->
  <div id="incognito-warning" style="display:none">
    <div class="card" style="border-left:4px solid #ff9800;background:#fff8e1">
      <h2 style="color:#e65100">需要开启无痕模式权限</h2>
      <ol style="font-size:12px;color:#5f6368;line-height:2;padding-left:16px;margin:8px 0">
        <li>打开 <code style="background:#f1f3f4;padding:1px 4px;border-radius:3px">chrome://extensions</code></li>
        <li>找到「GoodLink Token 抓取器」</li>
        <li>点击「详细信息」</li>
        <li>开启「允许在无痕模式下运行」</li>
      </ol>
      <button id="btn-recheck" class="btn btn-secondary" style="margin-top:4px">重新检测</button>
    </div>
  </div>

  <!-- 空闲 -->
  <div id="view-idle">
    <div class="card">
      <h2>导出设置</h2>
      <div class="setting-row">
        <label>保存路径</label>
        <input id="export-path" placeholder="GoodLink_tokens" />
      </div>
    </div>
    <div class="card">
      <h2>操作</h2>
      <ol style="font-size:12px;color:#5f6368;line-height:2;padding-left:16px;margin-bottom:16px">
        <li>打开无痕窗口，进入百度网盘</li>
        <li>在页面上<strong>登录</strong>（密码/扫码）</li>
        <li>登录后自动跳转 OAuth 授权</li>
        <li>捕获 Token + BDUSS → 导出文件</li>
      </ol>
      <button id="btn-start" class="btn btn-primary">开始抓取</button>
    </div>
  </div>

  <!-- 抓取中 -->
  <div id="view-capturing" style="display:none">
    <div class="card">
      <div class="status">
        <div class="spinner"></div>
        <div class="status-text">请在无痕窗口中登录百度网盘<br>登录后会自动跳转 OAuth</div>
      </div>
      <button id="btn-force" class="btn btn-secondary">手动跳转 OAuth →</button>
    </div>
  </div>

  <!-- 完成 -->
  <div id="view-done" style="display:none">
    <div class="card">
      <h2>捕获结果</h2>
      <div id="result-content"></div>
    </div>
    <button id="btn-reset" class="btn btn-secondary">继续抓取新账号</button>
  </div>

  <!-- 历史 -->
  <div id="history-section" style="display:none">
    <div class="card">
      <h2>已抓取 <span class="badge" id="history-count">0</span></h2>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
